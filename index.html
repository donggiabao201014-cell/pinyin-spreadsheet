<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pinyin Spreadsheet</title>
    <script src="https://unpkg.com/pinyin-pro@3.27.0/dist/index.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f4f7f6; color: #333; }
        .controls { margin-bottom: 20px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        
        .sheet-container { 
            overflow: auto; max-width: 95vw; max-height: 80vh; 
            border: 3px solid #2d6a4f; border-radius: 8px; 
            transition: all 0.3s ease;
        }
        
        #spreadsheet { 
            display: grid; background: white; 
            width: max-content; 
        }

        .mode-split { width: 100% !important; }
        .mode-split #spreadsheet { width: 100% !important; }

        .cell { border: 1px solid #d8e2dc; padding: 0; position: relative; display: flex; }
        .cell.selected { background: #cce5ff !important; box-shadow: inset 0 0 0 2px #007bff; }
        .header { background: #2d6a4f; color: #ffffff; font-weight: bold; text-align: center; padding: 10px; position: sticky; top: 0; z-index: 10; }
        
        textarea { 
            width: 100%; height: 100%; padding: 8px; border: none; box-sizing: border-box; 
            font-size: 16px; resize: none; font-family: inherit; background: transparent; 
            min-height: 40px; min-width: 100px;
        }
        
        .pinyin-cell { background: #f8f9fa; }
        button { padding: 8px 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-add { background: #2d6a4f; color: white; }
        .btn-sub { background: #b02a2a; color: white; }
        .btn-mode { background: #555; color: white; }
    </style>
    <link rel="icon" type="image/png" href="images.png">
</head>
<body>

    <h2>Pinyin Spreadsheet</h2>
    <div class="controls">
        <button class="btn-add" onclick="addRow()">+ Row</button>
        <button class="btn-sub" onclick="subRow()">- Row</button>
        <button class="btn-add" onclick="addCol()">+ Col</button>
        <button class="btn-sub" onclick="subCol()">- Col</button>
        <button class="btn-mode" onclick="toggleMode()">Toggle Split/Scroll</button>
        <button onclick="manualSave()" style="background: #217346; color: white;">Save</button>
        <small id="status"></small>
    </div>

    <div class="sheet-container" id="container">
        <div id="spreadsheet"></div>
    </div>

    <script>
        let gridData = { rows: 5, cols: 3, values: {} };
        let selectedCells = new Set();
        let lastClickedCell = null;
        let isSplitMode = false;

        window.onload = () => {
            const saved = localStorage.getItem('pinyinData');
            if (saved) gridData = JSON.parse(saved);
            renderGrid();
        };

        function toggleMode() {
            isSplitMode = !isSplitMode;
            renderGrid();
        }

        function syncDataFromDOM() {
            gridData.values = {};
            document.querySelectorAll('textarea').forEach(ta => {
                gridData.values[`${ta.dataset.r},${ta.dataset.c}`] = { text: ta.value };
            });
        }

        function addRow() { syncDataFromDOM(); gridData.rows++; renderGrid(); }
        function subRow() { syncDataFromDOM(); if(gridData.rows > 1) gridData.rows--; renderGrid(); }
        function addCol() { syncDataFromDOM(); gridData.cols++; renderGrid(); }
        function subCol() { syncDataFromDOM(); if(gridData.cols > 1) gridData.cols--; renderGrid(); }

        function renderGrid() {
            const sheet = document.getElementById('spreadsheet');
            const container = document.getElementById('container');
            
            if (isSplitMode) {
                container.classList.add('mode-split');
                sheet.style.gridTemplateColumns = `40px repeat(${gridData.cols * 2}, 1fr)`;
            } else {
                container.classList.remove('mode-split');
                sheet.style.gridTemplateColumns = `40px repeat(${gridData.cols * 2}, minmax(120px, auto))`;
            }
            
            const fragment = document.createDocumentFragment();
            fragment.appendChild(document.createElement('div'));
            for (let i = 0; i < gridData.cols; i++) {
                const h1 = document.createElement('div'); h1.className = 'header'; h1.textContent = "Hanzi";
                const h2 = document.createElement('div'); h2.className = 'header'; h2.textContent = "Pinyin";
                fragment.appendChild(h1); fragment.appendChild(h2);
            }

            for (let r = 0; r < gridData.rows; r++) {
                const rowNum = document.createElement('div');
                rowNum.className = 'header'; rowNum.textContent = r + 1;
                fragment.appendChild(rowNum);

                for (let c = 0; c < gridData.cols * 2; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell ' + (c % 2 !== 0 ? 'pinyin-cell' : '');
                    const ta = document.createElement('textarea');
                    ta.dataset.r = r; ta.dataset.c = c;
                    
                    const cellData = gridData.values[`${r},${c}`];
                    if (cellData) ta.value = cellData.text || "";

                    ta.onmousedown = handleMouseDown;
                    ta.oninput = handleInput;
                    
                    cell.appendChild(ta);
                    fragment.appendChild(cell);
                }
            }
            sheet.innerHTML = '';
            sheet.appendChild(fragment);
        }

        function handleInput() {
            const r = this.dataset.r, c = parseInt(this.dataset.c);
            if (c % 2 === 0) {
                const pinyinCell = document.querySelector(`textarea[data-r="${r}"][data-c="${c + 1}"]`);
                if (pinyinCell) pinyinCell.value = pinyinPro.pinyin(this.value.replace(/\s+/g, ''), { toneType: 'symbol' });
            }
        }

        function handleMouseDown(e) {
            if (e.shiftKey && lastClickedCell) {
                const r1 = parseInt(lastClickedCell.dataset.r), c1 = parseInt(lastClickedCell.dataset.c);
                const r2 = parseInt(this.dataset.r), c2 = parseInt(this.dataset.c);
                document.querySelectorAll('.cell').forEach(cl => cl.classList.remove('selected'));
                selectedCells.clear();
                for (let r = Math.min(r1, r2); r <= Math.max(r1, r2); r++) {
                    for (let c = Math.min(c1, c2); c <= Math.max(c1, c2); c++) {
                        const t = document.querySelector(`textarea[data-r="${r}"][data-c="${c}"]`);
                        if (t) { t.parentElement.classList.add('selected'); selectedCells.add(t); }
                    }
                }
            } else {
                document.querySelectorAll('.cell').forEach(cl => cl.classList.remove('selected'));
                selectedCells.clear();
                lastClickedCell = this;
            }
        }

        document.addEventListener('keydown', (e) => {
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                const active = document.activeElement;
                if (active.tagName === 'TEXTAREA') {
                    const r = parseInt(active.dataset.r), c = parseInt(active.dataset.c);
                    const map = { ArrowUp: [-1, 0], ArrowDown: [1, 0], ArrowLeft: [0, -1], ArrowRight: [0, 1] };
                    const next = document.querySelector(`textarea[data-r="${r + map[e.key][0]}"][data-c="${c + map[e.key][1]}"]`);
                    if (next) { e.preventDefault(); next.focus(); }
                }
            }
            
            if ((e.ctrlKey || e.metaKey) && e.key === 'c') {
                if (selectedCells.size > 0) {
                    const sortedCells = Array.from(selectedCells).sort((a, b) => a.dataset.r - b.dataset.r || a.dataset.c - b.dataset.c);
                    let clipboardText = "";
                    let currentRow = sortedCells[0].dataset.r;
                    sortedCells.forEach(cell => {
                        if (cell.dataset.r !== currentRow) { clipboardText += "\n"; currentRow = cell.dataset.r; }
                        else if (clipboardText !== "") { clipboardText += "\t"; }
                        clipboardText += cell.value;
                    });
                    navigator.clipboard.writeText(clipboardText).then(() => {
                        const status = document.getElementById('status');
                        status.textContent = "Copied!";
                        setTimeout(() => status.textContent = "", 2000);
                    });
                }
            }

            if (e.key === 'Delete' || e.key === 'Backspace') {
                selectedCells.forEach(ta => { ta.value = ''; });
                syncDataFromDOM();
            }
        });

        function manualSave() { 
            syncDataFromDOM(); 
            localStorage.setItem('pinyinData', JSON.stringify(gridData));
            const status = document.getElementById('status');
            status.textContent = "Saved!";
            setTimeout(() => status.textContent = "", 2000);
        }
    </script>
</body>
</html>
