<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pinyin Spreadsheet & Hanzii</title>
    <script src="https://unpkg.com/pinyin-pro@3.27.0/dist/index.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f4f7f6; color: #333; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; cursor: pointer; background: #ddd; border: none; border-radius: 4px; font-weight: bold; }
        .tab-btn.active { background: #2d6a4f; color: white; }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }
        .dict-container { width: 100%; height: 80vh; border: 3px solid #2d6a4f; border-radius: 8px; }
        .controls { margin-bottom: 20px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .sheet-container { overflow: auto; max-width: 95vw; max-height: 70vh; border: 3px solid #2d6a4f; border-radius: 8px; transition: all 0.3s ease; }
        #spreadsheet { display: grid; background: white; width: max-content; }
        .mode-split { width: 100% !important; }
        .mode-split #spreadsheet { width: 100% !important; }
        .cell { border: 1px solid #d8e2dc; padding: 0; position: relative; display: flex; background: transparent; }
        .cell.selected { background: #cce5ff !important; box-shadow: inset 0 0 0 2px #007bff; }
        textarea { width: 100%; padding: 8px; border: none; box-sizing: border-box; font-size: 16px; resize: none; overflow: hidden; font-family: inherit; background: white; min-height: 40px; min-width: 100px; display: block; }
        .pinyin-cell textarea { background: #f8f9fa; }
        textarea.highlighted { background: #fff3bf !important; }
        .header { background: #2d6a4f; color: #ffffff; font-weight: bold; text-align: center; padding: 10px; position: sticky; top: 0; z-index: 10; }
        button { padding: 8px 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-add { background: #2d6a4f; color: white; }
        .btn-sub { background: #b02a2a; color: white; }
        .btn-mode { background: #555; color: white; }
        .btn-reset { background: #888; color: white; }
        .btn-highlight { background: #fcc419; color: black; }
        .btn-undo { background: #444; color: white; }
    </style>
</head>
<body>

    <h2>Pinyin Spreadsheet & Hanzii</h2>
    <p><small>Tip: <b>Shift + Click</b> (full cell) | <b>Bôi đen (Highlight)</b> (specific text) to search.</small></p>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('editor', this)">Editor</button>
        <button class="tab-btn" onclick="switchTab('dict', this)">Dictionary</button>
    </div>

    <div id="editor" class="tab-panel active">
        <div class="controls">
            <button class="btn-add" onclick="addRow()">+ Row</button>
            <button class="btn-sub" onclick="subRow()">- Row</button>
            <button class="btn-add" onclick="addCol()">+ Col</button>
            <button class="btn-sub" onclick="subCol()">- Col</button>
            <button class="btn-highlight" onclick="highlightCells()">Highlight Text</button>
            <button class="btn-mode" onclick="toggleMode()">Toggle Split/Scroll</button>
            <button onclick="manualSave()" style="background: #217346; color: white;">Save</button>
            <button class="btn-reset" onclick="resetGrid()">Reset</button>
            <button class="btn-undo" onclick="undo()">Undo</button>
            <small id="status"></small>
        </div>
        <div class="sheet-container" id="container">
            <div id="spreadsheet"></div>
        </div>
    </div>

    <div id="dict" class="tab-panel">
        <iframe id="hanziiFrame" class="dict-container" src="https://hanzii.net/?hl=vi" title="Hanzii Dictionary"></iframe>
    </div>

    <script>
        let gridData = { rows: 5, cols: 3, values: {} };
        let selectedCells = new Set();
        let isSplitMode = false;

        function switchTab(id, btn) {
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        window.onload = () => {
            const saved = localStorage.getItem('pinyinData');
            if (saved) gridData = JSON.parse(saved);
            renderGrid();
        };

        function performSearch(query) {
            if (!query) return;
            const frame = document.getElementById('hanziiFrame');
            frame.src = `https://hanzii.net/search/word/${encodeURIComponent(query)}?hl=vi`;
            switchTab('dict', document.querySelector('.tab-btn:nth-child(2)'));
        }

        function saveHistory() {
            let history = JSON.parse(localStorage.getItem('pinyinHistory') || '[]');
            history.push(JSON.stringify(gridData));
            if (history.length > 50) history.shift();
            localStorage.setItem('pinyinHistory', JSON.stringify(history));
        }

        function undo() {
            let history = JSON.parse(localStorage.getItem('pinyinHistory') || '[]');
            if (history.length > 0) {
                gridData = JSON.parse(history.pop());
                localStorage.setItem('pinyinHistory', JSON.stringify(history));
                renderGrid();
                manualSave();
            }
        }

        function renderGrid() {
            const sheet = document.getElementById('spreadsheet');
            const container = document.getElementById('container');
            if (isSplitMode) {
                container.classList.add('mode-split');
                sheet.style.gridTemplateColumns = `40px repeat(${gridData.cols * 2}, 1fr)`;
            } else {
                container.classList.remove('mode-split');
                sheet.style.gridTemplateColumns = `40px repeat(${gridData.cols * 2}, minmax(120px, auto))`;
            }
            
            const fragment = document.createDocumentFragment();
            fragment.appendChild(document.createElement('div'));
            for (let i = 0; i < gridData.cols; i++) {
                const h1 = document.createElement('div'); h1.className = 'header'; h1.textContent = "Hanzi";
                const h2 = document.createElement('div'); h2.className = 'header'; h2.textContent = "Pinyin";
                fragment.appendChild(h1); fragment.appendChild(h2);
            }

            for (let r = 0; r < gridData.rows; r++) {
                const rowNum = document.createElement('div');
                rowNum.className = 'header'; rowNum.textContent = r + 1;
                fragment.appendChild(rowNum);
                for (let c = 0; c < gridData.cols * 2; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell ' + (c % 2 !== 0 ? 'pinyin-cell' : '');
                    const ta = document.createElement('textarea');
                    ta.dataset.r = r; ta.dataset.c = c;
                    const cellInfo = gridData.values[`${r},${c}`];
                    ta.value = cellInfo?.text || "";
                    if (cellInfo?.isHighlighted) ta.classList.add('highlighted');
                    
                    ta.onmousedown = (e) => {
                        if (e.shiftKey) { performSearch(ta.value.trim()); return; }
                        document.querySelectorAll('.cell').forEach(cl => cl.classList.remove('selected'));
                        ta.parentElement.classList.add('selected');
                        selectedCells.add(ta);
                    };
                    ta.onmouseup = () => {
                        const sel = window.getSelection().toString().trim();
                        if (sel) performSearch(sel);
                    };
                    ta.oninput = () => { 
                        if (c % 2 === 0) {
                            const pinyin = document.querySelector(`textarea[data-r="${r}"][data-c="${c + 1}"]`);
                            if (pinyin) pinyin.value = pinyinPro.pinyin(ta.value.replace(/\s+/g, ''), { toneType: 'symbol' });
                        }
                    };
                    cell.appendChild(ta);
                    fragment.appendChild(cell);
                }
            }
            sheet.innerHTML = '';
            sheet.appendChild(fragment);
        }

        function addRow() { saveHistory(); gridData.rows++; renderGrid(); }
        function subRow() { saveHistory(); if(gridData.rows > 1) gridData.rows--; renderGrid(); }
        function addCol() { saveHistory(); gridData.cols++; renderGrid(); }
        function subCol() { saveHistory(); if(gridData.cols > 1) gridData.cols--; renderGrid(); }
        function highlightCells() { 
            saveHistory(); 
            document.querySelectorAll('.selected textarea').forEach(ta => {
                ta.classList.toggle('highlighted');
            });
            manualSave();
        }
        function toggleMode() { isSplitMode = !isSplitMode; renderGrid(); }
        function resetGrid() { if(confirm("Reset?")) { gridData = { rows: 5, cols: 3, values: {} }; localStorage.removeItem('pinyinData'); renderGrid(); } }
        function manualSave() { 
            gridData.values = {}; 
            document.querySelectorAll('textarea').forEach(ta => {
                gridData.values[`${ta.dataset.r},${ta.dataset.c}`] = {
                    text: ta.value,
                    isHighlighted: ta.classList.contains('highlighted')
                };
            });
            localStorage.setItem('pinyinData', JSON.stringify(gridData));
            const s = document.getElementById('status'); s.textContent = "Saved!"; setTimeout(() => s.textContent = "", 2000);
        }
    </script>
</body>
</html>
