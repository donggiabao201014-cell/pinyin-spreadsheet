<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pinyin Spreadsheet</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f4f7f6; color: #333; }
        .row-container { display: flex; align-items: stretch; border-bottom: 1px solid #d8e2dc; }
        .row-num { background: #2d6a4f; color: white; width: 40px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .cell { border-right: 1px solid #d8e2dc; padding: 0; min-width: 120px; flex: 1; }
        .header-row { display: flex; }
        .header { background: #2d6a4f; color: white; font-weight: bold; text-align: center; padding: 10px; flex: 1; }
        textarea { 
            display: block; width: 100%; padding: 8px; border: none; box-sizing: border-box; font-size: 16px;
            resize: both; overflow: hidden; font-family: inherit; background: transparent; min-height: 40px;
        }
        .hanzi-ta { color: black !important; font-weight: bold !important; }
        .pinyin-ta { color: #1b4332; font-weight: 500; }
        textarea:focus { outline: none; background: #d8f3dc; box-shadow: inset 0 0 0 2px #2d6a4f; }
        .pinyin-cell { background: #f8f9fa; }
        button { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; background: #2d6a4f; color: white; margin-bottom: 5px; }
    </style>
</head>
<body>

    <h2>Pinyin Spreadsheet</h2>
    <div style="background: #e9ecef; padding: 10px; border-radius: 8px; display: inline-block;">
        Rows: <input type="number" id="setRows" value="5" style="width: 50px;"> 
        Cols: <input type="number" id="setCols" value="3" style="width: 50px;">
        <button onclick="updateGridSize()">Apply Size</button>
        <button onclick="manualSave()">Manual Save</button>
    </div>
    
    <div id="spreadsheet" style="margin-top:20px; border: 3px solid #2d6a4f; border-radius: 8px; display: inline-block;"></div>

    <script>
        let gridData = { rows: 5, cols: 3 };

        window.onload = () => {
            const savedData = localStorage.getItem('pinyinData');
            if (savedData) {
                const parsed = JSON.parse(savedData);
                gridData.rows = parsed.rows;
                gridData.cols = parsed.cols;
            }
            renderGrid();
        };

        function autoResize(ta) { ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px'; }

        function updateGridSize() {
            gridData.rows = parseInt(document.getElementById('setRows').value);
            gridData.cols = parseInt(document.getElementById('setCols').value);
            renderGrid();
        }

        function renderGrid() {
            const container = document.getElementById('spreadsheet');
            // We keep existing textareas by only appending/removing rather than wiping the whole div
            // If the user changes size, we save the current state to localStorage first
            let currentValues = {};
            document.querySelectorAll('textarea').forEach(ta => {
                currentValues[`${ta.dataset.r},${ta.dataset.c}`] = ta.value;
            });
            localStorage.setItem('pinyinData', JSON.stringify({rows: gridData.rows, cols: gridData.cols, values: currentValues}));

            container.innerHTML = ''; // This is now safe because we saved to localStorage first
            
            // Re-render headers
            const headerRow = document.createElement('div'); headerRow.className = 'header-row';
            headerRow.appendChild(document.createElement('div')).style.width = '40px';
            for(let i=0; i<gridData.cols; i++) {
                const h1 = document.createElement('div'); h1.className = 'header'; h1.textContent = "Hanzi"; headerRow.appendChild(h1);
                const h2 = document.createElement('div'); h2.className = 'header'; h2.textContent = "Pinyin"; headerRow.appendChild(h2);
            }
            container.appendChild(headerRow);

            // Re-render rows and inject saved values
            for(let r=0; r<gridData.rows; r++) {
                const rowDiv = document.createElement('div'); rowDiv.className = 'row-container';
                const num = document.createElement('div'); num.className = 'row-num'; num.textContent = r+1;
                rowDiv.appendChild(num);

                for(let c=0; c<gridData.cols * 2; c++) {
                    const cell = document.createElement('div'); cell.className = 'cell ' + (c%2 !== 0 ? 'pinyin-cell' : '');
                    const ta = document.createElement('textarea');
                    ta.dataset.r = r; ta.dataset.c = c;
                    ta.value = currentValues[`${r},${c}`] || "";
                    if(c%2 === 0) ta.classList.add('hanzi-ta');
                    else ta.classList.add('pinyin-ta');

                    ta.oninput = function() { autoResize(this); };
                    cell.appendChild(ta);
                    rowDiv.appendChild(cell);
                    setTimeout(() => autoResize(ta), 0);
                }
                container.appendChild(rowDiv);
            }
        }

        function manualSave() {
            let currentValues = {};
            document.querySelectorAll('textarea').forEach(ta => {
                currentValues[`${ta.dataset.r},${ta.dataset.c}`] = ta.value;
            });
            localStorage.setItem('pinyinData', JSON.stringify({rows: gridData.rows, cols: gridData.cols, values: currentValues}));
            alert("Progress Saved!");
        }
    </script>
</body>
</html>
