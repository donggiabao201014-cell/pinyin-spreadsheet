<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pinyin Spreadsheet</title>
    <script src="https://unpkg.com/pinyin-pro@3.27.0/dist/index.js"></script>
    <link rel="icon" type="image/png" href="images.png">
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f4f7f6; color: #333; }
        
        .row-container { display: flex; align-items: stretch; border-bottom: 1px solid #d8e2dc; }
        .row-num { background: #2d6a4f; color: white; width: 40px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .cell { border-right: 1px solid #d8e2dc; padding: 0; min-width: 120px; flex: 1; }
        .header-row { display: flex; }
        .header { background: #2d6a4f; color: white; font-weight: bold; text-align: center; padding: 10px; flex: 1; }
        
        textarea { 
            display: block; width: 100%; padding: 8px; border: none; box-sizing: border-box; font-size: 16px;
            resize: both; overflow: hidden; font-family: inherit; background: transparent; min-height: 40px;
        }
        
        .hanzi-ta { color: black !important; font-weight: bold !important; }
        .pinyin-ta { color: #1b4332; font-weight: 500; }
        textarea:focus { outline: none; background: #d8f3dc; box-shadow: inset 0 0 0 2px #2d6a4f; }
        .pinyin-cell { background: #f8f9fa; }
        
        button { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; background: #2d6a4f; color: white; margin-bottom: 5px; }
    </style>
</head>
<body>

    <h2>Pinyin Spreadsheet</h2>
    <div>
        <button onclick="addRow()">+ Add Row</button>
        <button onclick="removeRow()">- Remove Row</button>
        <button onclick="addCol()">+ Add Col</button>
        <button onclick="removeCol()">- Remove Col</button>
        <button onclick="manualSave()">Save Progress</button>
    </div>
    
    <div style="margin: 10px 0; background: #e9ecef; padding: 10px; border-radius: 8px; display: inline-block;">
        Rows: <input type="number" id="startRow" value="1" style="width: 40px;"> to <input type="number" id="endRow" value="1" style="width: 40px;"> |
        Cols: <input type="number" id="startCol" value="1" style="width: 40px;"> to <input type="number" id="endCol" value="1" style="width: 40px;">
        <button onclick="copyRange()" style="background: #1b4332;">Copy Selected Range</button>
    </div>

    <div id="spreadsheet" style="margin-top:20px; border: 3px solid #2d6a4f; border-radius: 8px; display: inline-block;"></div>

    <script>
        let gridData = { rows: 5, cols: 3, values: {} };

        window.onload = () => {
            const saved = localStorage.getItem('pinyinData');
            if (saved) gridData = JSON.parse(saved);
            renderGrid();
        };

        function syncDataFromDOM() {
            document.querySelectorAll('textarea').forEach(ta => {
                gridData.values[`${ta.dataset.r},${ta.dataset.c}`] = ta.value;
            });
        }

        function autoResize(ta) {
            ta.style.height = 'auto';
            ta.style.height = ta.scrollHeight + 'px';
        }

        function addRow() { syncDataFromDOM(); gridData.rows++; renderGrid(); }
        function removeRow() { if(gridData.rows > 1) { syncDataFromDOM(); gridData.rows--; renderGrid(); } }
        function addCol() { syncDataFromDOM(); gridData.cols++; renderGrid(); }
        function removeCol() { if(gridData.cols > 1) { syncDataFromDOM(); gridData.cols--; renderGrid(); } }

        function renderGrid() {
            const container = document.getElementById('spreadsheet');
            container.innerHTML = '';
            
            const headerRow = document.createElement('div'); headerRow.className = 'header-row';
            headerRow.appendChild(document.createElement('div')).style.width = '40px';
            for(let i=0; i<gridData.cols; i++) {
                const h1 = document.createElement('div'); h1.className = 'header'; h1.textContent = "Hanzi"; headerRow.appendChild(h1);
                const h2 = document.createElement('div'); h2.className = 'header'; h2.textContent = "Pinyin"; headerRow.appendChild(h2);
            }
            container.appendChild(headerRow);

            for(let r=0; r<gridData.rows; r++) {
                const rowDiv = document.createElement('div'); rowDiv.className = 'row-container';
                const num = document.createElement('div'); num.className = 'row-num'; num.textContent = r+1;
                rowDiv.appendChild(num);

                for(let c=0; c<gridData.cols * 2; c++) {
                    const cell = document.createElement('div'); cell.className = 'cell ' + (c%2 !== 0 ? 'pinyin-cell' : '');
                    const ta = document.createElement('textarea');
                    ta.dataset.r = r; ta.dataset.c = c;
                    ta.value = gridData.values[`${r},${c}`] || "";
                    if(c%2 === 0) ta.classList.add('hanzi-ta');
                    else ta.classList.add('pinyin-ta');

                    ta.oninput = function() {
                        autoResize(this);
                        if(c%2 === 0) {
                            const p = document.querySelector(`textarea[data-r="${r}"][data-c="${c+1}"]`);
                            if(p) { p.value = pinyinPro.pinyin(this.value.replace(/\s+/g, ''), { toneType: 'symbol' }); autoResize(p); }
                        }
                    };
                    cell.appendChild(ta);
                    rowDiv.appendChild(cell);
                    setTimeout(() => autoResize(ta), 0);
                }
                container.appendChild(rowDiv);
            }
        }

        function copyRange() {
            syncDataFromDOM();
            const rStart = parseInt(document.getElementById('startRow').value) - 1;
            const rEnd = parseInt(document.getElementById('endRow').value) - 1;
            const cStart = (parseInt(document.getElementById('startCol').value) - 1) * 2;
            const cEnd = (parseInt(document.getElementById('endCol').value) * 2) - 1;
            
            let text = "";
            for (let r = rStart; r <= rEnd; r++) {
                let row = [];
                for(let c = cStart; c <= cEnd; c++) row.push(gridData.values[`${r},${c}`] || "");
                text += row.join("\t") + "\n";
            }
            navigator.clipboard.writeText(text).then(() => alert("Copied range to clipboard!"));
        }

        function manualSave() {
            syncDataFromDOM();
            localStorage.setItem('pinyinData', JSON.stringify(gridData));
            alert("Progress Saved!");
        }
    </script>
</body>
</html>
